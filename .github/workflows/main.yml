name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Determine diff range
        id: diff
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          echo "base_sha=${base_sha}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: Scan added lines for secrets
        run: |
          python scripts/ci/check_secret_patterns.py \
            --base "${{ steps.diff.outputs.base_sha }}" \
            --head "${{ steps.diff.outputs.head_sha }}"

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Audit Python dependencies
        run: |
          python -m pip install --upgrade pip pip-audit
          python -m pip_audit -r requirements.txt --progress-spinner off

  targeted-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Determine diff range
        id: diff
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi
          echo "base_sha=${base_sha}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: Install development environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Guard against forbidden error-contract regressions
        run: |
          python scripts/ci/check_error_contract_patterns.py \
            --base "${{ steps.diff.outputs.base_sha }}" \
            --head "${{ steps.diff.outputs.head_sha }}"
      - name: Run targeted production-readiness regression bundle
        run: |
          python -m pytest \
            tests/test_sync_tar.py \
            tests/test_passivbot_execution.py \
            tests/test_passivbot_startup_utils.py \
            tests/test_passivbot_warmup_runtime.py \
            tests/test_candlestick_manager.py \
            tests/test_live_candlestick_manager.py \
            tests/test_fill_events_manager.py \
            tests/test_fill_events_parse_utils.py \
            tests/test_fill_events_model_utils.py \
            tests/test_ci_scripts.py \
            -q
      - name: Run Rust verification
        run: cargo check --manifest-path passivbot-rust/Cargo.toml --tests
